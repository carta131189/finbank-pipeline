name: FinBank Pipeline — CI/CD

on:
  push:
    branches: [main]
    paths:
      - "pipelines/**"
      - "orchestration/**"
      - "infra/**"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: "Ejecutar pipeline tras desplegar"
        required: false
        default: "false"
        type: boolean

env:
  TF_VERSION: "1.6.6"
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint y validación de código Python
  # ─────────────────────────────────────────────
  lint:
    name: Lint y validación de código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias de lint
        run: |
          pip install flake8 black isort pyflakes

      - name: Verificar formato con black
        run: black --check --line-length 100 pipelines/ orchestration/ data-generation/

      - name: Verificar imports con isort
        run: isort --check-only pipelines/ orchestration/ data-generation/

      - name: Lint con flake8
        run: |
          flake8 pipelines/ orchestration/ data-generation/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__

  # ─────────────────────────────────────────────
  # JOB 2: Validación de Terraform
  # ─────────────────────────────────────────────
  terraform_validate:
    name: Validar IaC Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (sin backend real)
        working-directory: infra
        run: |
          terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

  # ─────────────────────────────────────────────
  # JOB 3: Seguridad — detección de secretos
  # ─────────────────────────────────────────────
  secret_scan:
    name: Escaneo de secretos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar secretos con truffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Verificar que terraform.tfstate no esté en el repo
        run: |
          if git ls-files | grep -q "\.tfstate"; then
            echo "ERROR: terraform.tfstate encontrado en el repositorio."
            exit 1
          fi
          echo "OK: Sin archivos .tfstate en el repositorio."

  # ─────────────────────────────────────────────
  # JOB 4: Despliegue del workflow en Databricks
  # Solo en push a main, tras pasar lint y validate
  # ─────────────────────────────────────────────
  deploy_workflow:
    name: Desplegar workflow en Databricks
    runs-on: ubuntu-latest
    needs: [lint, terraform_validate, secret_scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: pip install requests

      - name: Desplegar workflow en Databricks
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python orchestration/deploy_workflow.py \
            --workflow orchestration/finbank_workflow.json \
            ${{ github.event.inputs.run_pipeline == 'true' && '--run-now' || '' }}

  # ─────────────────────────────────────────────
  # JOB 5: Terraform apply en dev (solo main)
  # ─────────────────────────────────────────────
  terraform_apply_dev:
    name: Terraform Apply — DEV
    runs-on: ubuntu-latest
    needs: [terraform_validate, secret_scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init — DEV
        working-directory: infra
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-finbank-tfstate" \
            -backend-config="storage_account_name=stfinbanktfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=finbank-dev.terraform.tfstate"

      - name: Terraform Plan — DEV
        working-directory: infra
        env:
          TF_VAR_sql_admin_user:     ${{ secrets.SQL_ADMIN_USER }}
          TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          terraform plan \
            -var-file="environments/dev/terraform.tfvars" \
            -out=tfplan_dev

      - name: Terraform Apply — DEV
        working-directory: infra
        run: terraform apply -auto-approve tfplan_dev
